name: Test Automation CI/CD

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC (helps catch external dependency issues)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger with optional parameters
    inputs:
      run_contract_tests:
        description: 'Run Addressable API contract tests (consumes quota)'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '18'

jobs:
  # Job 1: Lint and Code Quality Checks
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black
      
      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Check code formatting with black
        run: |
          black --check --diff .
        continue-on-error: true

  # Job 2: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Run safety check (dependency vulnerabilities)
        run: |
          pip install -r requirements.txt
          safety check --json
        continue-on-error: true
      
      - name: Run bandit (security linter)
        run: |
          bandit -r . -ll -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
          retention-days: 30

  # Job 3: Build and Start Application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: |
          cd ../address-checker-app
          docker compose build
      
      - name: Start application containers
        run: |
          cd ../address-checker-app
          docker compose up -d
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:8001/api/health; do sleep 2; done' || exit 1
          echo "Waiting for frontend to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:8085; do sleep 2; done' || exit 1
      
      - name: Verify services are running
        run: |
          docker compose ps
          curl -f http://localhost:8001/api/health
          curl -f http://localhost:8085
      
      - name: Save Docker logs
        if: failure()
        run: |
          cd ../address-checker-app
          docker compose logs > docker-logs.txt
      
      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: ../address-checker-app/docker-logs.txt
          retention-days: 7

  # Job 4: Run Automated Tests
  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: [lint, security]
    
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - name: "Functional Tests"
            path: "Tests/test_ui_flow.py"
            critical: true
          - name: "Security Tests"
            path: "Tests/test_backend_api.py Tests/test_jwt_security.py Tests/test_address_api.py"
            critical: true
          - name: "Error Handling Tests"
            path: "Tests/test_error_handling.py"
            critical: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Start application containers
        run: |
          cd ../address-checker-app
          docker compose up -d --wait
      
      - name: Wait for services health check
        run: |
          echo "Checking backend health..."
          for i in {1..30}; do
            if curl -f http://localhost:8001/api/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          echo "Checking frontend..."
          for i in {1..30}; do
            if curl -f http://localhost:8085; then
              echo "Frontend is accessible"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
      
      - name: Configure AWS credentials (for Cognito)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
        continue-on-error: true
      
      - name: Run ${{ matrix.test-suite.name }}
        id: test-execution
        run: |
          python -m pytest ${{ matrix.test-suite.path }} \
            -v \
            --tb=short \
            --html=report-${{ matrix.test-suite.name }}.html \
            --self-contained-html
        continue-on-error: ${{ !matrix.test-suite.critical }}
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.test-suite.name }}
          path: |
            report-${{ matrix.test-suite.name }}.html
            screenshots/
            test-results/
          retention-days: 30
      
      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.test-suite.name }}
          path: screenshots/
          retention-days: 7
      
      - name: Stop containers and cleanup
        if: always()
        run: |
          cd ../address-checker-app
          docker compose down
          docker compose rm -f

  # Job 5: Full Regression Test (All Tests)
  regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      
      - name: Start application
        run: |
          cd ../address-checker-app
          docker compose up -d --wait
          sleep 10
      
      - name: Verify services
        run: |
          curl -f http://localhost:8001/api/health
          curl -f http://localhost:8085
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
        continue-on-error: true
      
      - name: Run full test suite (excluding contract tests)
        run: |
          python -m pytest -v \
            --tb=short \
            --html=report.html \
            --self-contained-html \
            -m "not contract"
      
      - name: Run contract tests (if enabled)
        if: github.event.inputs.run_contract_tests == 'true' || github.event_name == 'schedule'
        run: |
          python -m pytest Tests/test_addressable_contract.py \
            -v \
            --tb=short \
            --html=contract-report.html \
            --self-contained-html
        continue-on-error: true
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** Full Regression" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f report.html ]; then
            echo "✅ Test report available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-reports
          path: |
            report.html
            contract-report.html
            screenshots/
            test-results/
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          cd ../address-checker-app
          docker compose down -v

  # Job 6: Performance Baseline
  performance:
    name: Performance Baseline
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      
      - name: Start application
        run: |
          cd ../address-checker-app
          docker compose up -d --wait
          sleep 10
      
      - name: Run performance test
        run: |
          time python -m pytest -v --tb=short
      
      - name: Record execution time
        run: |
          echo "Performance baseline recorded for commit ${{ github.sha }}" >> performance-log.txt
          date >> performance-log.txt
      
      - name: Cleanup
        if: always()
        run: |
          cd ../address-checker-app
          docker compose down

  # Job 7: Deployment Ready Check
  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [test, regression]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check all tests passed
        run: |
          echo "✅ All critical tests passed"
          echo "✅ Security scan completed"
          echo "✅ Full regression suite passed"
          echo ""
          echo "🚀 Application is ready for deployment"
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All quality gates passed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code quality checks" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Functional tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Error handling tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Full regression suite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ready for:** Production Deployment" >> $GITHUB_STEP_SUMMARY
      
      - name: Create release tag (if main branch)
        if: github.event_name == 'push'
        run: |
          echo "Create release tag: v$(date +%Y%m%d-%H%M%S)"

# Notifications and reporting
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [deployment-ready]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Pipeline completed: ${{ job.status }}"
          # Add Slack/Teams/Email notification here if needed
