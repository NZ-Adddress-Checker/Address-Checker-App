[pytest]
# Pytest configuration for NZ Address Checker Test Automation

# Default command line options
addopts = -v --strict-markers --tb=short -ra

# Test discovery
testpaths = Tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization (CI/CD ready)
markers =
    external: marks tests that call external APIs (deselect with '-m "not external"')
    contract: External API contract tests (skipped by default to preserve quota)
    functional: Functional end-to-end user flow tests
    security: Security and authentication tests
    api: Backend API endpoint tests
    error_handling: Error handling and resilience tests
    smoke: Critical smoke tests for quick validation
    slow: Tests that take longer than 10 seconds

# Console output
console_output_style = progress
log_cli = true
log_cli_level = INFO

# Minimum version
minversion = 7.0

# Test timeout (5 minutes per test)
timeout = 300

# Ignore directories
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .cache
    .pytest_cache
    node_modules
    venv

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning