version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_healthy
