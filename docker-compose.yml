services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: address-checker-api
    env_file:
      - backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-}
        VITE_COGNITO_REDIRECT_URI: ${VITE_COGNITO_REDIRECT_URI:-http://localhost:8080/callback}
        VITE_COGNITO_SCOPE: ${VITE_COGNITO_SCOPE:-email+openid+phone}
    container_name: address-checker-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
