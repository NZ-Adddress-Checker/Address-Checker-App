<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="New Zealand flag background">
  <rect width="1920" height="1080" fill="#012169"/>

  <!-- Union Jack canton -->
  <g transform="translate(0,0)">
    <rect width="960" height="540" fill="#012169"/>

    <!-- White diagonals -->
    <polygon points="0,0 95,0 960,445 960,540 865,540 0,95" fill="#FFFFFF"/>
    <polygon points="960,0 960,95 95,540 0,540 0,445 865,0" fill="#FFFFFF"/>

    <!-- Red diagonals -->
    <polygon points="0,0 50,0 960,455 960,540 910,540 0,85" fill="#C8102E"/>
    <polygon points="960,0 960,85 50,540 0,540 0,455 910,0" fill="#C8102E"/>

    <!-- White cross -->
    <rect x="0" y="216" width="960" height="108" fill="#FFFFFF"/>
    <rect x="426" y="0" width="108" height="540" fill="#FFFFFF"/>

    <!-- Red cross -->
    <rect x="0" y="237" width="960" height="66" fill="#C8102E"/>
    <rect x="447" y="0" width="66" height="540" fill="#C8102E"/>
  </g>

  <!-- Southern Cross stars with white borders -->
  <g>
    <g transform="translate(1310,230)">
      <polygon points="0,-56 15,-18 56,-18 23,6 35,46 0,21 -35,46 -23,6 -56,-18 -15,-18" fill="#FFFFFF"/>
      <polygon points="0,-44 12,-14 44,-14 18,5 28,35 0,16 -28,35 -18,5 -44,-14 -12,-14" fill="#C8102E"/>
    </g>

    <g transform="translate(1525,395)">
      <polygon points="0,-64 17,-20 64,-20 26,7 40,53 0,24 -40,53 -26,7 -64,-20 -17,-20" fill="#FFFFFF"/>
      <polygon points="0,-50 13,-16 50,-16 20,5 31,41 0,19 -31,41 -20,5 -50,-16 -13,-16" fill="#C8102E"/>
    </g>

    <g transform="translate(1260,560)">
      <polygon points="0,-52 14,-16 52,-16 21,6 33,43 0,20 -33,43 -21,6 -52,-16 -14,-16" fill="#FFFFFF"/>
      <polygon points="0,-40 11,-13 40,-13 16,4 25,32 0,15 -25,32 -16,4 -40,-13 -11,-13" fill="#C8102E"/>
    </g>

    <g transform="translate(1490,710)">
      <polygon points="0,-56 15,-18 56,-18 23,6 35,46 0,21 -35,46 -23,6 -56,-18 -15,-18" fill="#FFFFFF"/>
      <polygon points="0,-44 12,-14 44,-14 18,5 28,35 0,16 -28,35 -18,5 -44,-14 -12,-14" fill="#C8102E"/>
    </g>
  </g>
</svg>
