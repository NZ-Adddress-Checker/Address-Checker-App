name: Backend CI

on:
  workflow_call:
  push:
    branches: [ practice ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ practice ]
    paths:
      - 'backend/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.12'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pylint black isort pytest pytest-asyncio httpx
    
    - name: Lint with pylint
      run: |
        pylint backend --disable=C0111,C0103,W0212 --fail-under=7.0
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        black --check backend/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only backend/
      continue-on-error: true
    
    - name: Run tests
      run: |
        cd backend
        if python -m pytest ../tests/ -v --tb=short 2>&1; then
          echo "Tests passed"
        else
          exit_code=$?
          if [ $exit_code -eq 5 ]; then
            python -c "from main import app; print('Backend imports OK — no tests found')"
          else
            echo "Tests failed with exit code $exit_code"
            exit $exit_code
          fi
        fi

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install bandit
      run: pip install bandit==1.8.3
    
    - name: Run security scan with bandit
      run: |
        bandit -r backend/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json
      if: always()


