name: Code Quality and Testing

on:
  push:
    branches: [ Practice ]
  pull_request:
    branches: [ Practice ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Lint & Type Check
    uses: ./.github/workflows/backend.yml
    secrets: inherit
  
  frontend-checks:
    name: Frontend Lint & Build
    uses: ./.github/workflows/frontend.yml
    secrets: inherit
  
  codeql-analysis:
    name: CodeQL Security Analysis
    uses: ./.github/workflows/codeql.yml
    secrets: inherit
  
  secret-scanning:
    name: Secret & Credential Scanning
    uses: ./.github/workflows/secret-scanning.yml
    secrets: inherit
  
  container-security:
    name: Container & Dockerfile Security
    uses: ./.github/workflows/container-security.yml
    secrets: inherit
  
  sbom-generation:
    name: SBOM & Dependency Report
    uses: ./.github/workflows/sbom.yml
    secrets: inherit
  
  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit
  
  summary:
    name: CI Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, codeql-analysis, secret-scanning, container-security, sbom-generation, integration-tests]
    if: always()
    
    steps:
    - name: Check workflow status
      run: |
        if [ "${{ needs.backend-checks.result }}" == "failure" ] || \
           [ "${{ needs.frontend-checks.result }}" == "failure" ] || \
           [ "${{ needs.codeql-analysis.result }}" == "failure" ] || \
           [ "${{ needs.secret-scanning.result }}" == "failure" ] || \
           [ "${{ needs.container-security.result }}" == "failure" ] || \
           [ "${{ needs.integration-tests.result }}" == "failure" ]; then
          echo "❌ CI Pipeline Failed"
          exit 1
        else
          echo "✅ CI Pipeline Passed - All Security Checks Completed"
        fi
    
    - name: Pipeline Summary
      run: |
        echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Checks Completed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Backend Linting" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Frontend Build" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ CodeQL Security Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Secret & Credential Scanning" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Container Security (Hadolint + Trivy)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ SBOM & Dependency Audit" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Integration Tests" >> $GITHUB_STEP_SUMMARY
