name: Build and Push to ECR

on:
  push:
    branches: [mainline]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: ap-southeast-2
  ECR_BACKEND_REPO: address-checker-backend
  ECR_FRONTEND_REPO: address-checker-frontend
  APP_DIR: app
  AUTOMATION_DIR: Automation

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        with:
          projectBaseDir: app
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository --repository-name $ECR_BACKEND_REPO --region $AWS_REGION 2>/dev/null || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ env.APP_DIR }}/backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest \
            ${{ env.APP_DIR }}/backend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload backend Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

  build-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository --repository-name $ECR_FRONTEND_REPO --region $AWS_REGION 2>/dev/null || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ env.APP_DIR }}/frontend/Dockerfile \
            --build-arg REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }} \
            --build-arg REACT_APP_COGNITO_AUTHORITY=${{ secrets.REACT_APP_COGNITO_AUTHORITY }} \
            --build-arg REACT_APP_COGNITO_DOMAIN=${{ secrets.REACT_APP_COGNITO_DOMAIN }} \
            --build-arg REACT_APP_COGNITO_CLIENT_ID=${{ secrets.REACT_APP_COGNITO_CLIENT_ID }} \
            --build-arg REACT_APP_REDIRECT_URI=${{ secrets.REACT_APP_REDIRECT_URI }} \
            --build-arg REACT_APP_LOGOUT_URI=${{ secrets.REACT_APP_LOGOUT_URI }} \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest \
            ${{ env.APP_DIR }}/frontend

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload frontend Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest

  e2e-tests:
    name: Automation E2E Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backend test environment
        run: |
          printf '%s\n' \
            'COGNITO_REGION=ap-southeast-2' \
            'USER_POOL_ID=ap-southeast-2_2oQQDAKa4' \
            'CLIENT_ID=4p7i1nq2t426jufkh0pe7fgo2u' \
            'CORS_ORIGIN=http://localhost:8085' \
            > ${{ env.APP_DIR }}/.env

      - name: Start app with Docker Compose
        run: docker compose -f ${{ env.APP_DIR }}/docker-compose.yml up -d --build

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/api/health || curl -sf http://localhost:8001/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... attempt $i"
            sleep 3
          done
          echo "ERROR: Backend never became healthy" && exit 1

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8085 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... attempt $i"
            sleep 3
          done
          echo "ERROR: Frontend never became ready" && exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ env.AUTOMATION_DIR }}/requirements.txt

      - name: Install automation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.AUTOMATION_DIR }}/requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run API and security tests
        run: |
          python -m pytest \
            Tests/test_backend_api.py \
            Tests/test_jwt_security.py \
            Tests/test_address_api.py \
            -v --tb=short \
            --html=report-api.html \
            --self-contained-html
        working-directory: ${{ env.AUTOMATION_DIR }}

      - name: Run Playwright UI tests
        run: |
          python -m pytest \
            Tests/test_ui_flow.py \
            Tests/test_error_handling.py \
            -v --tb=short \
            --html=report-ui.html \
            --self-contained-html
        working-directory: ${{ env.AUTOMATION_DIR }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            ${{ env.AUTOMATION_DIR }}/report-api.html
            ${{ env.AUTOMATION_DIR }}/report-ui.html
            ${{ env.AUTOMATION_DIR }}/screenshots/
            ${{ env.AUTOMATION_DIR }}/test-results/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f ${{ env.APP_DIR }}/docker-compose.yml down -v

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr-deploy
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update backend task definition with new image
        id: backend-task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          NEW_IMAGE="$ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition address-checker-backend \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) |
             .containerDefinitions[0].image = $img')
          TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "td_arn=$TD_ARN" >> $GITHUB_OUTPUT

      - name: Update frontend task definition with new image
        id: frontend-task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-deploy.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          NEW_IMAGE="$ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG"
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition address-checker-frontend \
            --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) |
             .containerDefinitions[0].image = $img')
          TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "td_arn=$TD_ARN" >> $GITHUB_OUTPUT

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_BACKEND_SERVICE }} \
            --task-definition ${{ steps.backend-task-def.outputs.td_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_FRONTEND_SERVICE }} \
            --task-definition ${{ steps.frontend-task-def.outputs.td_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_BACKEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}
