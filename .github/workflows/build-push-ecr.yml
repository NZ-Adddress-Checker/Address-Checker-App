name: Build and Push to ECR

on:
  push:
    branches: [mainline]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: ap-southeast-2
  ECR_BACKEND_REPO: address-checker-backend
  ECR_FRONTEND_REPO: address-checker-frontend

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository --repository-name $ECR_BACKEND_REPO --region $AWS_REGION 2>/dev/null || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest \
            .

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload backend Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

  build-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository --repository-name $ECR_FRONTEND_REPO --region $AWS_REGION 2>/dev/null || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            --build-arg VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN }} \
            --build-arg VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }} \
            --build-arg VITE_COGNITO_REDIRECT_URI=${{ secrets.VITE_COGNITO_REDIRECT_URI }} \
            --build-arg VITE_COGNITO_SCOPE=${{ secrets.VITE_COGNITO_SCOPE }} \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest \
            .

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload frontend Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest

  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backend test environment
        run: |
          cat > backend/.env << 'EOF'
          APP_ENV=test
          FRONTEND_ORIGINS=http://localhost:8080
          JWT_ISSUER=https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_test
          JWT_AUDIENCE=test-client-id
          JWKS_URL=https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_test/.well-known/jwks.json
          NZPOST_MOCK=true
          EOF

      - name: Start app with Docker Compose
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_COGNITO_DOMAIN: https://test-domain.auth.ap-southeast-2.amazoncognito.com
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_COGNITO_REDIRECT_URI: http://localhost:8080/callback
          VITE_COGNITO_SCOPE: email+openid+phone
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... attempt $i"
            sleep 3
          done

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... attempt $i"
            sleep 3
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: npm-e2e-

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
          BACKEND_URL: http://localhost:8000
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::864144288759:role/github-actions-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new backend deployment
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_BACKEND_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Force new frontend deployment
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_FRONTEND_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_BACKEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }}
