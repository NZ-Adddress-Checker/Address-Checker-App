name: Secret Scanning

on:
  workflow_call:
  push:
    branches: [ practice ]
  pull_request:
    branches: [ practice ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  secrets:
    name: Scan for Secrets and Credentials
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --json
      continue-on-error: true

    - name: Detect secrets with GitGuardian
      uses: GitGuardian/ggshield-action@master
      env:
        GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
        GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
        GITHUB_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      continue-on-error: true

    - name: Python Secrets Detection with detect-secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline
        detect-secrets audit .secrets.baseline
      continue-on-error: true

    - name: Check for common credential patterns
      run: |
        echo "Checking for AWS keys..."
        grep -r "AKIA[0-9A-Z]\{16\}" . --include="*.py" --include="*.js" --include="*.json" && echo "⚠️ Potential AWS keys found" || echo "✓ No AWS keys detected"
        
        echo "Checking for private keys..."
        grep -r "PRIVATE KEY\|BEGIN RSA\|BEGIN OPENSSH" . --include="*.py" --include="*.js" && echo "⚠️ Potential private keys found" || echo "✓ No private keys detected"
        
        echo "Checking for database URLs..."
        grep -r "postgresql://\|mysql://\|mongodb://.*:.*@" . --include="*.py" --include="*.js" && echo "⚠️ Potential credentials in URLs" || echo "✓ No credential URLs detected"
      continue-on-error: true


