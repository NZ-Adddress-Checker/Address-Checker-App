name: Deploy to Production

on:
  push:
    branches: [ practice ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      BACKEND_IMAGE: nz-adddress-checker/address-checker-app-backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: env.DOCKER_USERNAME != ''
    
    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: ${{ env.DOCKER_USERNAME != '' }}
        tags: |
          ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          ${{ env.BACKEND_IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/practice'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy notification
      run: |
        echo "🚀 Deployment started for image: ${{ needs.build.outputs.image_tag }}"
        echo "This is where you would deploy to your production environment"
        echo "Add your deployment commands here (e.g., kubectl, docker pull, etc.)"
      
    - name: Verify deployment
      run: |
        echo "✅ Deployment verification placeholder"
        echo "Add health checks and verification here"

