name: Docker Build Test

# Validates that both Docker images build and start correctly.
# Does NOT push — that is handled by deploy.yml on the practice branch.
on:
  pull_request:
    branches: [practice]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-test:
    name: Build & smoke-test images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: address-checker-backend:ci
          outputs: type=docker,dest=/tmp/backend.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test backend image
        run: |
          docker load --input /tmp/backend.tar
          docker run --rm address-checker-backend:ci \
            python -c "from main import app; print('Backend OK')"

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          tags: address-checker-frontend:ci
          outputs: type=docker,dest=/tmp/frontend.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test frontend image
        run: |
          docker load --input /tmp/frontend.tar
          docker run --rm address-checker-frontend:ci nginx -t

      - name: Scan backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: address-checker-backend:ci
          format: sarif
          output: trivy-backend.sarif
        continue-on-error: true

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-sarif
          path: trivy-backend.sarif
        if: always()


