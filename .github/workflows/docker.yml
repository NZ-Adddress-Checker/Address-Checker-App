name: Docker Build and Push

on:
  push:
    branches: [ practice ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: nz-adddress-checker/address-checker-app-backend
      FRONTEND_IMAGE: nz-adddress-checker/address-checker-app-frontend
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        tags: |
          ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          ${{ env.BACKEND_IMAGE }}:latest
        push: false
        outputs: type=docker,dest=/tmp/backend-image.tar
    
    - name: Load backend image
      run: |
        docker load --input /tmp/backend-image.tar
    
    - name: Test backend image
      run: |
        docker run --rm ${{ env.BACKEND_IMAGE }}:${{ github.sha }} python -c "from main import app; print('Backend container OK')"
      continue-on-error: true
    
    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/frontend.Dockerfile
        tags: |
          ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          ${{ env.FRONTEND_IMAGE }}:latest
        push: false
        outputs: type=docker,dest=/tmp/frontend-image.tar
    
    - name: Load frontend image
      run: |
        docker load --input /tmp/frontend-image.tar
    
    - name: Test frontend image
      run: |
        docker run --rm ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} nginx -t
      continue-on-error: true
    
    - name: Image metadata
      run: |
        echo "Backend image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
        echo "Frontend image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
        docker images | grep "address-checker-app"
    
    - name: Scan with Trivy (Backend)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
        format: sarif
        output: backend-trivy-results.sarif
      continue-on-error: true
    
    - name: Upload Trivy results (Backend)
      uses: actions/upload-artifact@v4
      with:
        name: docker-trivy-backend-sarif
        path: backend-trivy-results.sarif
      if: always()

