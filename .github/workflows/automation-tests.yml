name: Automation Tests Pipeline

on:
  push:
    branches:
      - main
      - practice
  pull_request:
    branches:
      - main
      - practice

jobs:
  test-automation:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Cognito vars needed at build time (Vite bakes them in) AND at runtime (automation container).
    # Defining once at job level avoids repetition across steps.
    env:
      VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
      VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
      VITE_COGNITO_REDIRECT_URI: http://localhost:8080/callback
      VITE_COGNITO_SCOPE: email+openid+phone
      VITE_API_BASE_URL: http://localhost:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: |
          cd docker
          docker compose build
      
      - name: Start application services
        run: |
          cd docker
          docker compose up -d backend frontend
      
      - name: Verify backend is accessible
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Waiting for backend... (attempt $attempt/$max_attempts)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1
      
      - name: Run Playwright tests
        run: |
          cd docker
          docker compose run --rm automation
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: docker/test-results/
          retention-days: 30
      
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: docker/screenshots/
          retention-days: 7
      
      - name: Stop services
        if: always()
        run: |
          cd docker
          docker compose down

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: docker/test-results/*.xml
          reporter: java-junit
          fail-on-error: false
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsDir = 'docker/test-results';
            const xmlFiles = fs.existsSync(resultsDir)
              ? fs.readdirSync(resultsDir).filter(f => f.endsWith('.xml'))
              : [];
            
            let comment = '## Automation Test Results\n\n';
            if (xmlFiles.length > 0) {
              comment += 'Test report generated. See the **Playwright Test Results** check and artifacts for details.\n';
            } else {
              comment += 'No test results found. Check artifacts for failure details and screenshots.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

