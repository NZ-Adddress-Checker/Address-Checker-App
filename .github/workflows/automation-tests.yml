name: Automation Tests Pipeline

on:
  push:
    branches:
      - main
      - practice
  pull_request:
    branches:
      - main
      - practice

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-automation:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: |
          cd docker
          docker-compose build
        env:
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: http://localhost:8080/callback
      
      - name: Start application services
        run: |
          cd docker
          docker-compose up -d backend frontend
          echo "Waiting for services to be healthy..."
          sleep 15
        env:
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      
      - name: Verify backend is accessible
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Waiting for backend... (attempt $attempt/$max_attempts)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1
      
      - name: Run Playwright tests
        run: |
          cd docker
          docker-compose run --rm automation
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: docker/test-results/
          retention-days: 30
      
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: docker/screenshots/
          retention-days: 7
      
      - name: Stop services
        if: always()
        run: |
          cd docker
          docker-compose down
      
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: docker/test-results/report.html
          reporter: 'html'
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docker/test-results/report.html';
            
            let comment = '## Automation Test Results\n\n';
            
            if (fs.existsSync(reportPath)) {
              comment += '✓ Test report generated. See artifacts for details.\n';
            } else {
              comment += '✗ Tests failed. Check artifacts for failure details and screenshots.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: test-automation
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.test-automation.result }}" = "success" ]; then
            echo "✓ All tests passed!"
            exit 0
          else
            echo "✗ Tests failed!"
            exit 1
          fi
