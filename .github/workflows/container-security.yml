name: Container Security Scanning

on:
  workflow_call:
  push:
    branches: [ practice ]
    paths:
      - 'docker/**'
  pull_request:
    branches: [ practice ]
    paths:
      - 'docker/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Run Hadolint on backend Dockerfile
      id: hadolint-backend
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/Dockerfile
        config: .hadolintignore
      continue-on-error: true

    - name: Run Hadolint on frontend Dockerfile
      id: hadolint-frontend
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/frontend.Dockerfile
        config: .hadolintignore
      continue-on-error: true

    - name: Generate Hadolint Report
      if: always()
      run: |
        backend="${{ steps.hadolint-backend.outcome }}"
        frontend="${{ steps.hadolint-frontend.outcome }}"
        icon() { [ "$1" == "success" ] && echo "✅" || echo "⚠️"; }
        echo "# Dockerfile Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "| Dockerfile | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Dockerfile | $(icon $backend) $backend |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Dockerfile | $(icon $frontend) $frontend |" >> $GITHUB_STEP_SUMMARY

  container-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Runs in parallel with hadolint — no dependency between linting and image scanning

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: false
        outputs: type=docker,dest=/tmp/backend-image.tar
        tags: backend-security-scan:latest

    - name: Load backend image
      run: docker load --input /tmp/backend-image.tar

    - name: Scan backend with Trivy
      id: trivy-backend
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: backend-security-scan:latest
        format: sarif
        output: backend-trivy.sarif
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload backend Trivy results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-backend-sarif
        path: backend-trivy.sarif

    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/frontend.Dockerfile
        push: false
        outputs: type=docker,dest=/tmp/frontend-image.tar
        tags: frontend-security-scan:latest

    - name: Load frontend image
      run: docker load --input /tmp/frontend-image.tar

    - name: Scan frontend with Trivy
      id: trivy-frontend
      uses: aquasecurity/trivy-action@0.30.0
      with:
        image-ref: frontend-security-scan:latest
        format: sarif
        output: frontend-trivy.sarif
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload frontend Trivy results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-frontend-sarif
        path: frontend-trivy.sarif

    - name: Generate Container Security Report
      if: always()
      run: |
        backend="${{ steps.trivy-backend.outcome }}"
        frontend="${{ steps.trivy-frontend.outcome }}"
        icon() { [ "$1" == "success" ] && echo "✅" || echo "⚠️"; }
        echo "# Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "| Image | Trivy Scan |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | $(icon $backend) $backend |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | $(icon $frontend) $frontend |" >> $GITHUB_STEP_SUMMARY
