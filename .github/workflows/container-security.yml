name: Container Security Scanning

on:
  push:
    branches: [ Practice ]
    paths:
      - 'docker/**'
  pull_request:
    branches: [ Practice ]
    paths:
      - 'docker/**'

jobs:
  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Hadolint on backend Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/Dockerfile
        config: .hadolintignore
      continue-on-error: true

    - name: Run Hadolint on frontend Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/frontend.Dockerfile
        config: .hadolintignore
      continue-on-error: true

    - name: Generate Hadolint Report
      if: always()
      run: |
        echo "# Dockerfile Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- Backend Dockerfile: Linted" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend Dockerfile: Linted" >> $GITHUB_STEP_SUMMARY

  container-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    needs: hadolint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        dockerfile: docker/Dockerfile
        push: false
        outputs: type=docker,dest=/tmp/backend-image.tar
        tags: backend-security-scan:latest

    - name: Load backend image
      run: docker load --input /tmp/backend-image.tar

    - name: Scan backend with Trivy (strict)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: backend-security-scan:latest
        format: sarif
        output: backend-trivy.sarif
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload backend Trivy results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: backend-trivy.sarif
        category: trivy-backend
      if: always()

    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        dockerfile: docker/frontend.Dockerfile
        push: false
        outputs: type=docker,dest=/tmp/frontend-image.tar
        tags: frontend-security-scan:latest

    - name: Load frontend image
      run: docker load --input /tmp/frontend-image.tar

    - name: Scan frontend with Trivy (strict)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: frontend-security-scan:latest
        format: sarif
        output: frontend-trivy.sarif
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload frontend Trivy results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: frontend-trivy.sarif
        category: trivy-frontend
      if: always()

    - name: Generate Container Security Report
      if: always()
      run: |
        echo "# Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- Backend: Scanned with Trivy" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend: Scanned with Trivy" >> $GITHUB_STEP_SUMMARY
