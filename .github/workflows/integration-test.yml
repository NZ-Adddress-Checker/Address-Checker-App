name: Integration Tests

on:
  push:
    branches: [ Practice ]
  pull_request:
    branches: [ Practice ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    services:
      backend:
        image: python:3.12-slim
        options: >-
          --health-cmd "python -c 'import socket; socket.create_connection((\"localhost\", 8000))'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Test backend health endpoint
      run: |
        cd backend
        python -c 'from fastapi.testclient import TestClient; from main import app; client = TestClient(app); response = client.get("/health"); assert response.status_code == 200; print("✓ Health check passed")'
    
    - name: Test import chain
      run: |
        cd backend
        python -c 'from main import app; from auth import require_jwt; from services.nzpost import get_address_suggestions, validate_address; print("✓ All imports successful")'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Test frontend build
      working-directory: frontend
      run: npm run build
    
    - name: Verify frontend build output
      run: |
        if [ -d "frontend/dist" ]; then
          echo "✓ Frontend build successful"
          ls -la frontend/dist/
        else
          echo "✗ Frontend build directory not found"
          exit 1
        fi
