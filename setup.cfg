# Configuration file for code linting and formatting

[pylint]
# Minimum pylint score to pass
min_score = 7.0

[black]
line-length = 100
target-version = ['py312']

[isort]
profile = black
line_length = 100
multi_line_mode = 3  # vertical hanging indent

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

[coverage:run]
branch = True
source = backend
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
