[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    smoke: Smoke tests - basic functionality verification
    sanity: Sanity tests - key features verification
    auth: Authentication tests
    address: Address feature tests
    slow: Slow tests
